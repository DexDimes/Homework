<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="stylesheet" href="./2.40.css" />
	</head>
	<body>
		<form class="form">
			<fieldset class="form-group">
				<legend class="form-group-title">Ваши личные данные</legend>
				<label class="label" for="name" >
					Ваше имя
					<input
						id="name"
						class="input"
						type="text"
						placeholder="Имя"
						required
					/>
				</label>
				<label class="label" for="age">
					Ваш возраст
					<input
						id="age"
						class="input"
						type="number"
						placeholder="Возраст"
						required
					/>
				</label>
				<label class="label" for="phone-number">
					Ваш номер телефона
					<input
						id="phone-number"
						class="input"
						type="tel"
						placeholder="Номер телефона"
						required
					/>
				</label>
				<label class="label" for="email">
					Ваша почта
					<input
						id="email"
						class="input"
						type="email"
						placeholder="Адрес эл.почты"
						required
					/>
				</label>
      </label>
			</fieldset>
      <fieldset class="form-group2">
        <label class="label" for="message">
          Ваше сообщение 
        <textarea id="message" class="textarea" name="your-message" placeholder="Сообщение" required></textarea>
      </label>
        <label class="label" for="checkbox">
          <input
						id="checkbox"
						class="checkbox"
						type="checkbox"
						required
					/>
          <span class="checkbox-name">Я принимаю правила</span>
        </label>
        <button class="button">Отправить</button>
      </fieldset>
		</form>
	</body>
</html>
